<div class="form-container">
  <h2 class="welcome-text">
    Forgot Password?
    <p class="subtext">Enter your registered email to receive a reset link.</p>
  </h2>

  <form class="auth-form" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <input type="email" formControlName="email" placeholder=" ">
      <label>Email Address</label>
      <small class="error-msg" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
        Please enter a valid email.
      </small>
    </div>

    <button type="submit" class="submit-btn" routerLink="/auth/reset-password" [disabled]="forgotForm.invalid">
      Send Reset Link
    </button>
  </form>

  <div class="back-to-login-wrapper" style="margin-top: 2rem;">
    <a routerLink="/auth/login" class="back-link" style="color: #fff; text-decoration: none; font-size: 0.9rem;">
      <i class="bi bi-chevron-left"></i> Back to Login
    </a>
  </div>
</div>
