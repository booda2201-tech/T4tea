<div class="auth-container">
  <div class="background-overlay"></div>

  <div class="auth-content">
    <div class="auth-card">
      <div class="logo-wrapper">
        <img src="assets/Group 7 (1).png" alt="T4TEA Logo" class="logo" routerLink="/">
      </div>

      <h2 class="welcome-text">{{ isLoginMode ? 'Welcome Back' : 'Hello' }}</h2>

      <form class="auth-form">
        <div class="input-group">
          <input type="text" id="username" placeholder=" ">
          <label for="username">User Name</label>
        </div>

<div class="input-group">
  <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder=" ">
  <label for="password">Password</label>

  <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
      (click)="togglePasswordVisibility('pass')"></i>
</div>



        <div class="input-group" *ngIf="!isLoginMode">
          <input [type]="showRePassword ? 'text' : 'password'" id="repassword" placeholder=" ">
          <label for="repassword">Re-Password</label>
          <i class="bi" [ngClass]="showRePassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="togglePasswordVisibility('repass')"></i>
        </div>

        <button type="submit" class="submit-btn">
          {{ isLoginMode ? 'Login' : 'Signup' }}
        </button>
      </form>


          <div class="options-link mt-3" *ngIf="isLoginMode">
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
      <p class="toggle-text" (click)="toggleMode()">
        {{ isLoginMode ? "Don't have an account? Create one" : "Already have an account? Login" }}
      </p>
    </div>
  </div>
</div>
