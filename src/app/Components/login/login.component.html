<div class="form-wrapper">
  <h2 class="welcome-text">
    Welcome Back
    <p class="subtext">Enter your details to get sign in to your account.</p>
  </h2>

  <form class="auth-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <input type="text" formControlName="username" id="username" placeholder=" ">
      <label for="username">User Name</label>
      <small class="error-msg" *ngIf="authForm.get('username')?.touched && authForm.get('username')?.invalid">
        Field is required
      </small>
    </div>

    <div class="input-group">
      <input [type]="showPassword ? 'text' : 'password'" formControlName="password" id="password" placeholder=" ">
      <label for="password">Password</label>
      <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePasswordVisibility('pass')"></i>
      <small class="error-msg" *ngIf="authForm.get('password')?.touched && authForm.get('password')?.invalid">
        Min 6 characters required
      </small>
    </div>

    <div class="options-link mt-2">
      <a routerLink="/auth/forgot-password" class="forgot-link" style="cursor: pointer; color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.8;">
        Forgot Password?
      </a>
    </div>

    <button type="submit" class="submit-btn" [disabled]="isButtonDisabled()">
      Login
    </button>
  </form>

  <p class="toggle-text" routerLink="/auth/signup" style="color: white; margin-top: 1.5rem; cursor: pointer; font-size: 0.85rem; opacity: 0.7;">
    Don't have an account? Create one
  </p>
</div>
