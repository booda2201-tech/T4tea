



<div class="auth-container">
  <div class="background-overlay"></div>

  <div class="auth-content">
    <div class="auth-card">
      <div class="logo-wrapper">
        <img src="assets/Group 7 (1).png" alt="T4TEA Logo" class="logo" routerLink="">
      </div>

      <h2 class="welcome-text">Hello</h2>
      <form class="auth-form">
        <div class="input-group">
          <input type="text" id="username" placeholder=" ">
          <label for="username">User Name</label>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder=" ">
          <label for="password">Password</label>
        </div>

        <div class="input-group" *ngIf="!isLoginMode">
          <label>Re-Password</label>
          <input type="password" placeholder="Re-Password">
        </div>

        <button type="submit" class="submit-btn">
          {{ isLoginMode ? 'Login' : 'Signup' }}
        </button>
      </form>

      <p class="toggle-text" (click)="toggleMode()">
        {{ isLoginMode ? "Don't have an account? Create one" : "Already have an account? Login" }}
      </p>
    </div>
  </div>
</div>
