<div class="cont">
<div class="all-products-page">
  <div class="container">

    <header class="page-header">
      <h1 class="serif-title">Our Collection</h1>
    </header>

    <div class="products-grid" *ngIf="filteredProducts.length > 0; else noResults">
      <div class="product-card" *ngFor="let product of filteredProducts">
<div class="wishlist" (click)="toggleFavorite(product)">
  <i class="bi"
      [class.bi-heart-fill]="product.isFavorite"
      [class.bi-heart]="!product.isFavorite"
      [class.active]="product.isFavorite">
  </i>
</div>

        <div class="image-box">
          <img [src]="product.image" [alt]="product.name">
        </div>

        <div class="content-box">
          <!-- <span class="category-tag">{{ product.category }}</span> -->
          <h3 class="product-name">{{ product.name }}</h3>
          <p class="product-price">{{ product.price }}</p>
          <button class="add-to-cart">
            <i class="bi bi-cart-plus"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>

    <ng-template #noResults>
      <div class="empty-search">
        <i class="bi bi-search-heart"></i>
        <p>We couldn't find any products matching "{{ searchText }}"</p>
        <button (click)="searchText = ''; onSearch()" class="reset-btn">View All Products</button>
      </div>
    </ng-template>

  </div>
</div>
</div>
