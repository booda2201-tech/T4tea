
<div class="cont">
<div class="cart-page-wrapper">
  <div class="container">
    <div class="section-header">
      <h1 class="section-title">Cart</h1>
      <p class="section-subtitle">Thank You For Choosing Us</p>
    </div>

    <div class="cart-layout">
      <div class="items-column">
        <div class="product-card" *ngFor="let item of cartItems">
          <div class="img-box">
            <img [src]="item.image" alt="tea">
          </div>

          <div class="info-box">
            <h3>{{item.name}}</h3>
            <span>{{item.type}}</span>
          </div>

          <div class="controls-box">
            <div class="qty-selector">
              <button (click)="decrease(item)">-</button>
              <span class="qty-val">{{item.quantity}}</span>
              <button (click)="increase(item)">+</button>
            </div>
            <div class="price-tag">{{item.price}} EGP</div>
          </div>

          <button class="remove-btn">×</button>
        </div>
      </div>

      <div class="summary-column">
        <div class="sticky-card">
          <h2 class="summary-title">Cart Summary</h2>

          <div class="summary-list">
            <div class="summary-line" *ngFor="let item of cartItems">
              <div class="line-info">
                <strong>{{item.name}}</strong>
                <small>{{item.type}}</small>
              </div>
              <span class="line-qty">x {{item.quantity}}</span>
            </div>
          </div>

          <hr class="divider">

          <div class="total-row">
            <span>Total :</span>
            <span class="total-val">{{ calculateTotal() }} EGP</span>
          </div>

          <button class="checkout-btn">Check Out</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
