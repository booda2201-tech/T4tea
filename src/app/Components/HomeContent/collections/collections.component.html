<section class="collections-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Teawares</h2>
      <p class="section-subtitle">Savor the Art of Fine Tea.</p>
    </div>

    <owl-carousel-o [options]="customOptions">
      <ng-container *ngFor="let category of categories">
        <ng-template carouselSlide>
          <div class="collection-card m-2"> <div class="img-wrapper orange-bg">
              <img [src]="category.img" [alt]="category.title">
            </div>
            <h3>{{category.title}}</h3>
            <p>{{category.description}}</p>
            <button class="shop-btn" (click)="onCollectionClick()">Shop Now</button>
          </div>
        </ng-template>
      </ng-container>

    </owl-carousel-o>
  </div>
  <img src="../../../../assets/w.png" class="leaf-decoration" alt="decoration">
</section>
