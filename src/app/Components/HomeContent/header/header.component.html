<section class="hero-section">
  <div class="container h-100">
    <div class="row h-100 align-items-center">

      <div class="col-lg-8 hero-text-part text-start">

        <div class="mask-wrapper">
          <h1 class="hero-title m-0">From Rare Leaves</h1>
        </div>

        <div class="mask-wrapper">
          <h1 class="hero-title">to Remarkable Moments.</h1>
        </div>

        <div class="hero-btns gap-3 mt-4">
          <div class="btn-mask">
            <button class="btn custom-btn-white" (click)="onBestSellerClick()">Best Seller</button>
          </div>
          <div class="btn-mask">
            <button class="btn custom-btn-outline" (click)="onExploreClick()">Explore</button>
          </div>
        </div>

      </div>

    </div>
  </div>
</section>
