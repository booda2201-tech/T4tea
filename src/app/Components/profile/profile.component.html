


<div class="cont">
  <div class="t4tea-profile-wrapper">
<div class="profile-header">
  <h1 class="serif-title">My Profile</h1>
  <div class="header-actions">
    <button *ngIf="!isEditing" class="btn-outline-gold" (click)="toggleEdit()">Edit</button>
    <div *ngIf="isEditing" class="edit-buttons">
      <button class="btn-text-grey" (click)="toggleEdit()">Cancel</button>
      <button class="btn-solid-teal" (click)="saveProfile()">Save</button>
    </div>
  </div>
</div>

<section class="personal-info-card" [class.editing-mode]="isEditing">
  <div class="info-group">
    <label>Name</label>
    <p *ngIf="!isEditing">{{ userData.name }}</p>
    <input *ngIf="isEditing" type="text" [(ngModel)]="userData.name" class="edit-input">
  </div>

  <div class="info-group">
    <label>Email</label>
    <p *ngIf="!isEditing">{{ userData.email }}</p>
    <input *ngIf="isEditing" type="email" [(ngModel)]="userData.email" class="edit-input">
  </div>

  <div class="info-group">
    <label>Phone</label>
    <p *ngIf="!isEditing">{{ userData.phone }}</p>
    <input *ngIf="isEditing" type="text" [(ngModel)]="userData.phone" class="edit-input">
  </div>
</section>

<section class="addresses-section">
  <div class="section-header">
    <h2 class="serif-title">Addresses</h2>
    <button class="btn-solid-teal" (click)="openAddAddressModal()">+ Add Address</button>
  </div>

  <div *ngFor="let addr of addresses"
        [id]="'address-' + addr.id"
        class="address-item"
        [class.default-border]="addr.isDefault">

    <div class="address-body">
      <span *ngIf="addr.isDefault" class="badge-default">Default</span>
      <p class="main-address">{{ addr.main }}</p>
      <p class="sub-address">{{ addr.sub }}</p>
      <p class="landmark"><strong>Landmark:</strong> {{ addr.landmark }}</p>
    </div>

<div class="address-actions">
  <button
    [class.btn-disabled]="addr.isDefault"
    [disabled]="addr.isDefault"
    (click)="makeDefault(addr.id)">
    {{ addr.isDefault ? 'Default' : 'Make Default' }}
  </button>

  <button class="btn-delete" (click)="deleteAddress(addr.id)">Delete</button>
</div>
  </div>
</section>


</div>
</div>

<div class="t4tea-modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
  <div class="t4tea-modal-container" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="serif-title">Add New Address</h2>
      <button class="close-btn" (click)="closeModal()">&times;</button>
    </div>

    <form class="modal-form" (submit)="addAddress($event)">
      <div class="form-grid grid-2">
        <div class="input-box">
          <label>Country</label>
          <select [(ngModel)]="newAddress.country" name="country"><option>Egypt</option></select>
        </div>
        <div class="input-box">
          <label>Governorate</label>
          <select [(ngModel)]="newAddress.gov" name="gov"><option>Giza</option></select>
        </div>
      </div>

      <div class="input-box full-width">
        <label>Street Name</label>
        <input type="text" [(ngModel)]="newAddress.street" name="street" placeholder="e.g. El Tahrir St.">
      </div>

      <div class="form-grid grid-3">
        <div class="input-box">
          <label>Bld.</label>
          <input type="text" [(ngModel)]="newAddress.bld" name="bld" placeholder="12">
        </div>
        <div class="input-box">
          <label>Floor</label>
          <input type="text" [(ngModel)]="newAddress.floor" name="floor" placeholder="2">
        </div>
        <div class="input-box">
          <label>Apt.</label>
          <input type="text" [(ngModel)]="newAddress.apt" name="apt" placeholder="4">
        </div>
      </div>

      <div class="input-box full-width">
        <label>Landmark</label>
        <input type="text" [(ngModel)]="newAddress.landmark" name="landmark" placeholder="Famous place nearby">
      </div>

      <div class="modern-checkbox">
        <input type="checkbox" id="default-addr" [(ngModel)]="newAddress.setAsDefault" name="default">
        <label for="default-addr">Set as default address</label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save Address</button>
      </div>
    </form>
  </div>
</div>
